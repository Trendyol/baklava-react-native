name: Release

on:
  push:
    branches:
      - main
      - next
      - 1.0.x

# Required for npm Trusted Publishing (OIDC) + semantic-release/github
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  verify:
    uses: ./.github/workflows/verify.yml
    secrets: inherit
  publish-docs:
    # Only publish docs from main branch
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/publish-docs.yml
    needs: verify
    secrets: inherit
  release:
    uses: ./.github/workflows/publish-package.yml
    needs: verify
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    secrets: inherit
